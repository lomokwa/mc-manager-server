basePath: /
definitions:
  types.APIResponse:
    properties:
      data: {}
      error:
        type: string
      success:
        type: boolean
    type: object
  types.CreateServerRequest:
    properties:
      configureProperties:
        type: boolean
      createLaunchScript:
        type: boolean
      loaderVersion:
        type: string
      properties:
        additionalProperties:
          type: string
        type: object
      releaseVersion:
        type: string
      serverType:
        type: string
    required:
    - serverType
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for managing a Minecraft server
  title: MC Manager API
  version: "1.0"
paths:
  /api/server:
    delete:
      description: Removes the server jar and all server files
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/types.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/types.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete the Minecraft server
      tags:
      - server
    get:
      description: Returns whether a server jar has been created
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.APIResponse'
      security:
      - BearerAuth: []
      summary: Check if server exists
      tags:
      - server
    post:
      consumes:
      - application/json
      description: Downloads the server jar and prepares server files
      parameters:
      - description: Server configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/types.CreateServerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/types.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/types.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/types.APIResponse'
      security:
      - BearerAuth: []
      summary: Create a new Minecraft server
      tags:
      - server
  /api/start:
    post:
      description: Starts the Minecraft server process
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/types.APIResponse'
      security:
      - BearerAuth: []
      summary: Start the Minecraft server
      tags:
      - server
  /api/status:
    get:
      description: Returns whether the Minecraft server is running, plus its PID,
        start time and uptime (seconds) while it is up
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get server status
      tags:
      - server
  /api/stop:
    post:
      description: Stops the running Minecraft server process
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Stop the Minecraft server
      tags:
      - server
swagger: "2.0"
